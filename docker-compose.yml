name: customs-poc   # fix ชื่อ project ไว้ตรงๆ ไม่ให้ผันตามชื่อโฟลเดอร์ที่ clone มา (เช่น Customs_POC vs
                    # customs_poc) — ทำให้ชื่อ volume คงที่เสมอ (customs-poc_customs-data ฯลฯ) เดา/อ้างอิงได้

services:
  # ขา 1: train — ตั้งแต่ container เริ่ม ingest + เทรน BERTopic อัตโนมัติบนข้อมูลจริง (ถ้ายังไม่มีโมเดล)
  # แล้วเปิดเว็บแอป Streamlit ให้ดูผล/ทดสอบทีละรายการ
  app:
    build: .
    image: customs-bertopic:latest
    ports:
      - "8501:8501"
    volumes:
      - customs-data:/app/data
      - customs-models:/app/models
      - customs-hf-cache:/app/.cache/huggingface
      - ./seed_data:/app/seed_data:ro   # วางไฟล์ข้อมูลเริ่มต้น (.csv/.xlsx) ไว้ในโฟลเดอร์นี้บน host
    environment:
      - DATA_PATH=/app/seed_data/input.xlsx   # เปลี่ยนชื่อไฟล์ให้ตรงกับที่วางจริงใน ./seed_data
      # - DATA_SHEET=Sheet1                          # ถ้าไฟล์เป็น .xlsx และไม่ใช่ sheet แรก
      # - FORCE_RETRAIN=1                            # บังคับ ingest+เทรนใหม่ทุกครั้งที่ container start
      # - TRAIN_ARGS=--sample-cap 30000 --nr-topics 8 # พารามิเตอร์เพิ่มเติมส่งต่อให้ train.py
      # ถ้าโหลดโมเดล embedding ลงใน volume customs-hf-cache ไว้ล่วงหน้าแล้ว (เครื่องออกเน็ตไม่ได้เลย)
      # เปิด 2 ตัวนี้เพื่อไม่ให้ลองต่อเน็ตเช็ค HuggingFace อีกเลย ใช้ cache local อย่างเดียว (ดู README
      # หัวข้อ "เครื่องออกเน็ตไม่ได้เลย")
      # - HF_HUB_OFFLINE=1
      # - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped

  # ขา 2: test — "ต้องรอผลจากขา train ก่อน" (อ่านโมเดล/สถิติราคาที่เทรนไว้แล้วจาก volume customs-models
  # ตัวเดียวกับขา train แบบ read-only) ทุกครั้งที่เปิด/รีเฟรชหน้าเว็บ (http://localhost:8800) จะ ingest
  # ไฟล์ทดสอบคงที่ที่ bake ไว้ในอิมเมจ (webapp/fixtures/) แล้ว "พยากรณ์" แต่ละรายการเทียบกับโมเดลนั้น
  # (ไม่เทรนโมเดลใหม่เอง) จำลองว่ามีชุดใบขนสินค้าขาเข้าเข้ามาให้ระบบตรวจทุกครั้ง — heading ที่ไม่มีโมเดล
  # อ้างอิงจะแสดงสถานะ "ไม่มีข้อมูลอ้างอิง" (ดู webapp/pipeline.py) ผลการพยากรณ์เก็บลง DuckDB แยกต่างหาก
  # ภายใน container เอง (ไม่ persist ข้ามรัน, ไม่เขียนกลับเข้า customs-models เลย)
  webapp:
    build: .
    image: customs-bertopic:latest
    entrypoint: ["python", "-X", "utf8", "-m", "uvicorn", "webapp.main:app"]
    command: ["--host", "0.0.0.0", "--port", "8800"]
    ports:
      - "8800:8800"
    volumes:
      - customs-models:/app/models:ro              # โมเดล/สถิติราคาที่ขา train เทรนไว้แล้ว (อ่านอย่างเดียว)
      - customs-hf-cache:/app/.cache/huggingface   # ใช้ cache โมเดล embedding ร่วมกับขา train (ไม่โหลดซ้ำ)
    environment:
      # cache ของ multilingual-e5-large ถูกโหลดเข้า volume นี้ไว้ล่วงหน้าแล้ว (จาก hf_cache_e5_large.tar.gz
      # ที่แพ็คมาให้ในโปรเจกต์ — ดู README หัวข้อ "เครื่องออกเน็ตไม่ได้เลย") ไม่ต้องพยายามต่อเน็ตไปเช็ค
      # HuggingFace เลยแม้แต่ครั้งเดียว
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 180s   # รอโมเดล embedding โหลดครั้งแรก (ช้าถ้ายังไม่มี cache ใน customs-hf-cache)
      retries: 3
    restart: unless-stopped

volumes:
  customs-data:
  customs-models:
  customs-hf-cache:
